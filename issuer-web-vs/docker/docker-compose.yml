# =============================================================================
# Issuer Web VS — Local Docker Compose
# =============================================================================
#
# Runs the VS Agent + Issuer Web App for local development/testing.
#
# Prerequisites:
#   - Docker and Docker Compose installed
#   - ngrok running on port 3005
#
# Usage:
#   source issuer-web-vs/config.env
#   export NGROK_DOMAIN=your-domain.ngrok-free.app
#   docker compose up --build
#
# =============================================================================

services:
  vs-agent:
    image: ${VS_AGENT_IMAGE:-veranalabs/vs-agent:latest}
    platform: linux/amd64
    ports:
      - "${VS_AGENT_ADMIN_PORT:-3004}:3000"
      - "${VS_AGENT_PUBLIC_PORT:-3005}:3001"
    environment:
      - AGENT_PUBLIC_DID=did:webvh:${NGROK_DOMAIN}
      - AGENT_LABEL=${SERVICE_NAME:-Example Issuer Web App}
      - ENABLE_PUBLIC_API_SWAGGER=true
    volumes:
      - vs-agent-data:/root/.afj

  issuer-web:
    build: ../issuer-web
    ports:
      - "${ISSUER_WEB_PORT:-4001}:${ISSUER_WEB_PORT:-4001}"
    environment:
      - VS_AGENT_ADMIN_URL=http://vs-agent:3000
      - PORT=${ISSUER_WEB_PORT:-4001}
      - SERVICE_NAME=${SERVICE_NAME:-Example Issuer Web App}
      - CUSTOM_SCHEMA_BASE_ID=${CUSTOM_SCHEMA_BASE_ID:-example}
      - ENABLE_ANONCREDS=${ENABLE_ANONCREDS:-true}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      - vs-agent

volumes:
  vs-agent-data:
