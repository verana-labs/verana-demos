# =============================================================================
# Verifier Chatbot VS — Local Docker Compose
# =============================================================================
#
# Runs the VS Agent + Verifier Chatbot for local development/testing.
#
# Prerequisites:
#   - Docker and Docker Compose installed
#   - ngrok running on port 3007
#
# Usage:
#   source verifier-chatbot-vs/config.env
#   export NGROK_DOMAIN=your-domain.ngrok-free.app
#   docker compose up --build
#
# =============================================================================

services:
  vs-agent:
    image: ${VS_AGENT_IMAGE:-veranalabs/vs-agent:latest}
    platform: linux/amd64
    ports:
      - "${VS_AGENT_ADMIN_PORT:-3006}:3000"
      - "${VS_AGENT_PUBLIC_PORT:-3007}:3001"
    environment:
      - AGENT_PUBLIC_DID=did:webvh:${NGROK_DOMAIN}
      - AGENT_LABEL=${SERVICE_NAME:-Example Verifier Chatbot}
      - ENABLE_PUBLIC_API_SWAGGER=true
      - EVENTS_BASE_URL=http://verifier-chatbot:${CHATBOT_PORT:-4002}
    volumes:
      - vs-agent-data:/root/.afj

  verifier-chatbot:
    build: ../verifier-chatbot
    ports:
      - "${CHATBOT_PORT:-4002}:${CHATBOT_PORT:-4002}"
    environment:
      - VS_AGENT_ADMIN_URL=http://vs-agent:3000
      - CHATBOT_PORT=${CHATBOT_PORT:-4002}
      - DATABASE_URL=${DATABASE_URL:-sqlite:./data/sessions.db}
      - SERVICE_NAME=${SERVICE_NAME:-Example Verifier Chatbot}
      - ORG_VS_PUBLIC_URL=${ORG_VS_PUBLIC_URL:-}
      - ISSUER_VS_PUBLIC_URL=${ISSUER_VS_PUBLIC_URL:-}
    depends_on:
      - vs-agent

volumes:
  vs-agent-data:
