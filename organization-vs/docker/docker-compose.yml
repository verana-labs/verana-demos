# =============================================================================
# Organization VS — Local Docker Compose
# =============================================================================
#
# Runs the VS Agent for local development/testing.
#
# Prerequisites:
#   - Docker and Docker Compose installed
#   - ngrok running on port 3001
#
# Usage:
#   export NGROK_DOMAIN=your-domain.ngrok-free.app
#   docker compose up
#
# =============================================================================

services:
  vs-agent:
    image: ${VS_AGENT_IMAGE:-veranalabs/vs-agent:latest}
    platform: linux/amd64
    ports:
      - "${VS_AGENT_ADMIN_PORT:-3000}:3000"
      - "${VS_AGENT_PUBLIC_PORT:-3001}:3001"
    environment:
      - AGENT_PUBLIC_DID=did:webvh:${NGROK_DOMAIN}
      - AGENT_LABEL=${SERVICE_NAME:-Example Organization Service}
      - ENABLE_PUBLIC_API_SWAGGER=true
    volumes:
      - vs-agent-data:/root/.afj

volumes:
  vs-agent-data:
