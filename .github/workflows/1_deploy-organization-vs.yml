name: 1_ Deploy Organization VS

on:
  workflow_dispatch:
    inputs:
      step:
        description: "Which step to run"
        required: true
        type: choice
        options:
          - deploy
          - get-ecs-credentials
          - create-trust-registry
          - all
        default: all

jobs:
  deploy-organization-vs:
    name: Deploy Organization VS Agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate branch and extract network
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          if [ "$BRANCH" = "vs/testnet-main" ]; then
            echo "::error::Branch vs/testnet-main is reserved. Deploy from 'main' branch instead."
            exit 1
          elif [ "$BRANCH" = "main" ]; then
            NETWORK="testnet"
            VS_NAME="main"
          elif [[ "$BRANCH" =~ ^vs/(testnet|devnet)- ]]; then
            SUFFIX="${BRANCH#vs/}"
            NETWORK="${SUFFIX%%-*}"
            VS_NAME="${SUFFIX#*-}"
          else
            echo "::error::Branch must be 'main' or match vs/testnet-<name> or vs/devnet-<name> (current: $BRANCH)"
            exit 1
          fi
          echo "NETWORK=${NETWORK}" >> "$GITHUB_ENV"
          echo "VS_NAME=${VS_NAME}" >> "$GITHUB_ENV"
          echo "Branch: $BRANCH — Network: $NETWORK — Service: $VS_NAME"

      - name: Load configuration
        run: |
          set -a
          source organization-vs/config.env
          set +a
          while IFS= read -r line; do
            key="${line%%=*}"
            echo "${key}=${!key}" >> "$GITHUB_ENV"
          done < <(grep -E '^[A-Z_]+=' organization-vs/config.env)

      - name: Resolve deployment.yaml placeholders
        run: |
          sed -e "s/__NETWORK__/${NETWORK}/g" -e "s/__VS_NAME__/${VS_NAME}/g" \
            organization-vs/deployment.yaml > /tmp/deployment-resolved.yaml
          echo "--- Resolved deployment.yaml ---"
          cat /tmp/deployment-resolved.yaml

      - name: Parse deployment.yaml
        run: |
          CHART_SOURCE=$(yq '.chartSource' /tmp/deployment-resolved.yaml)
          CHART_VERSION=$(yq '.chartVersion' /tmp/deployment-resolved.yaml)
          CHART_NAMESPACE="${{ secrets.K8S_NAMESPACE }}"
          RELEASE_NAME=$(yq '.name' /tmp/deployment-resolved.yaml)
          INGRESS_HOST=$(yq '.ingress.host' /tmp/deployment-resolved.yaml)
          echo "CHART_SOURCE=${CHART_SOURCE}" >> "$GITHUB_ENV"
          echo "CHART_VERSION=${CHART_VERSION}" >> "$GITHUB_ENV"
          echo "CHART_NAMESPACE=${CHART_NAMESPACE}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=${RELEASE_NAME}" >> "$GITHUB_ENV"
          echo "INGRESS_HOST=${INGRESS_HOST}" >> "$GITHUB_ENV"
          echo "Chart: $CHART_SOURCE@$CHART_VERSION → $CHART_NAMESPACE/$RELEASE_NAME"

      - name: Generate Helm values
        run: |
          yq 'del(.chartSource, .chartVersion)' /tmp/deployment-resolved.yaml > /tmp/helm-values.yaml
          yq -i '.didcommLabel = env(SERVICE_NAME)' /tmp/helm-values.yaml
          yq -i '.didcommInvitationImageUrl = env(SERVICE_LOGO_URL)' /tmp/helm-values.yaml
          # Do NOT expose admin via Helm private ingress — a standalone
          # path-restricted ingress is deployed separately after Helm install.
          echo "--- Helm values ---"
          cat /tmp/helm-values.yaml

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          cat > ~/.kube/config <<'KUBEEOF'
          ${{ secrets.OVH_KUBECONFIG }}
          KUBEEOF

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.9'

      - name: Install veranad
        run: |
          VERANAD_VERSION="v0.9.4"
          curl -sfL "https://github.com/verana-labs/verana/releases/download/${VERANAD_VERSION}/veranad-linux-amd64" \
            -o /usr/local/bin/veranad
          chmod +x /usr/local/bin/veranad
          veranad version

      - name: Import account from mnemonic
        run: |
          echo "${{ secrets.VS_DEMO_MNEMONIC }}" | veranad keys add "${{ env.USER_ACC }}" --recover --keyring-backend test

      # -----------------------------------------------------------------------
      # DEPLOY: Install/upgrade VS Agent via Helm
      # -----------------------------------------------------------------------
      - name: Deploy VS Agent via Helm
        if: inputs.step == 'deploy' || inputs.step == 'all'
        run: |
          helm upgrade --install "$RELEASE_NAME" "$CHART_SOURCE" \
            --version "$CHART_VERSION" \
            --namespace "$CHART_NAMESPACE" --create-namespace \
            --values /tmp/helm-values.yaml \
            --wait --timeout 300s

      - name: Deploy admin ingress (issuance endpoint only)
        if: (inputs.step == 'deploy' || inputs.step == 'all') && env.EXPOSE_ADMIN_API == 'true'
        run: |
          ADMIN_HOST="admin.${INGRESS_HOST}"
          ADMIN_SECRET="${ADMIN_HOST}-cert"
          cat <<EOF | kubectl apply -n "$CHART_NAMESPACE" -f -
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: admin-${RELEASE_NAME}
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              nginx.ingress.kubernetes.io/enable-cors: "true"
          spec:
            ingressClassName: nginx
            tls:
              - hosts:
                  - ${ADMIN_HOST}
                secretName: ${ADMIN_SECRET}
            rules:
              - host: ${ADMIN_HOST}
                http:
                  paths:
                    - path: /api
                      pathType: Prefix
                      backend:
                        service:
                          name: ${RELEASE_NAME}
                          port:
                            number: 3000
                    - path: /v1/vt/issue-credential
                      pathType: Exact
                      backend:
                        service:
                          name: ${RELEASE_NAME}
                          port:
                            number: 3000
          EOF
          echo "Admin ingress deployed: https://${ADMIN_HOST}/v1/vt/issue-credential"

      # -----------------------------------------------------------------------
      # PORT-FORWARD: Access admin API via kubectl
      # -----------------------------------------------------------------------
      - name: Port-forward VS Agent admin API
        if: inputs.step == 'get-ecs-credentials' || inputs.step == 'create-trust-registry' || inputs.step == 'all'
        run: |
          kubectl port-forward -n "$CHART_NAMESPACE" "svc/$RELEASE_NAME" 3000:3000 &
          echo "PF_PID=$!" >> "$GITHUB_ENV"
          sleep 5
          curl -sf http://localhost:3000/v1/agent > /dev/null || {
            echo "Port-forward failed — is the $RELEASE_NAME pod running in $CHART_NAMESPACE?"
            exit 1
          }
          echo "Port-forward established"

      # -----------------------------------------------------------------------
      # GET-ECS-CREDENTIALS: Obtain Organization + Service credentials
      # -----------------------------------------------------------------------
      - name: "Get ECS credentials"
        if: inputs.step == 'get-ecs-credentials' || inputs.step == 'all'
        run: |
          export ADMIN_API="http://localhost:3000"
          source common/common.sh
          set_network_vars "$NETWORK"

          AGENT_INFO=$(curl -sf "${ADMIN_API}/v1/agent")
          AGENT_DID=$(echo "$AGENT_INFO" | jq -r '.publicDid')
          echo "AGENT_DID=${AGENT_DID}" >> "$GITHUB_ENV"
          ok "Agent DID: $AGENT_DID"

          # Discover Organization VTJSC from ECS TR DID document
          ORG_VTJSC_OUTPUT=$(discover_ecs_vtjsc "$ECS_TR_PUBLIC_URL" "organization")
          ORG_JSC_URL=$(echo "$ORG_VTJSC_OUTPUT" | sed -n '1p')

          # Discover Service VTJSC and schema ID from ECS TR DID document
          SERVICE_VTJSC_OUTPUT=$(discover_ecs_vtjsc "$ECS_TR_PUBLIC_URL" "service")
          SERVICE_JSC_URL=$(echo "$SERVICE_VTJSC_OUTPUT" | sed -n '1p')
          CS_SERVICE_ID=$(echo "$SERVICE_VTJSC_OUTPUT" | sed -n '2p')
          echo "CS_SERVICE_ID=${CS_SERVICE_ID}" >> "$GITHUB_ENV"

          # Clean up previous ECS credentials (linked VPs + VTJSCs)
          cleanup_ecs_credentials "$ADMIN_API" "$ORG_JSC_URL" "$SERVICE_JSC_URL"

          # Obtain Organization credential from ECS TR
          ORG_LOGO_DATA_URI=$(download_logo_data_uri "$ORG_LOGO_URL")
          SERVICE_LOGO_DATA_URI=$(download_logo_data_uri "$SERVICE_LOGO_URL")

          ORG_CLAIMS=$(jq -n \
            --arg id "$AGENT_DID" \
            --arg name "$ORG_NAME" \
            --arg logo "$ORG_LOGO_DATA_URI" \
            --arg rid "$ORG_REGISTRY_ID" \
            --arg addr "$ORG_ADDRESS" \
            --arg cc "$ORG_COUNTRY" \
            '{id: $id, name: $name, logo: $logo, registryId: $rid, address: $addr, countryCode: $cc}')

          issue_remote_and_link "$ECS_TR_ADMIN_API" "$ADMIN_API" "organization" "$ORG_JSC_URL" "$AGENT_DID" "$ORG_CLAIMS"

          # Ensure ISSUER permission for Service schema
          if EXISTING_PERM=$(find_active_issuer_perm "$CS_SERVICE_ID" "$AGENT_DID"); then
            ok "Active ISSUER permission already exists: $EXISTING_PERM — skipping creation"
          else
            log "No active ISSUER permission found — creating one"
            check_balance "$USER_ACC"
            EFFECTIVE_FROM=$(future_timestamp 15)
            ISSUER_PERM_SERVICE=$(submit_tx "create_permission" "permission_id" \
              veranad tx perm create-perm "$CS_SERVICE_ID" issuer "$AGENT_DID" \
              --effective-from "$EFFECTIVE_FROM")
            sleep 21
          fi

          # Self-issue Service credential
          SERVICE_CLAIMS=$(jq -n \
            --arg id "$AGENT_DID" \
            --arg name "$SERVICE_NAME" \
            --arg type "$SERVICE_TYPE" \
            --arg desc "$SERVICE_DESCRIPTION" \
            --arg logo "$SERVICE_LOGO_DATA_URI" \
            --argjson age "$SERVICE_MIN_AGE" \
            --arg terms "$SERVICE_TERMS" \
            --arg privacy "$SERVICE_PRIVACY" \
            '{id: $id, name: $name, type: $type, description: $desc, logo: $logo, minimumAgeRequired: $age, termsAndConditions: $terms, privacyPolicy: $privacy}')

          issue_remote_and_link "$ADMIN_API" "$ADMIN_API" "service" "$SERVICE_JSC_URL" "$AGENT_DID" "$SERVICE_CLAIMS"

      # -----------------------------------------------------------------------
      # CREATE-TRUST-REGISTRY: Create Trust Registry with custom schema
      # -----------------------------------------------------------------------
      - name: "Create Trust Registry"
        if: inputs.step == 'create-trust-registry' || inputs.step == 'all'
        run: |
          export ADMIN_API="http://localhost:3000"
          source common/common.sh
          set_network_vars "$NETWORK"

          AGENT_DID="${AGENT_DID:-$(curl -sf "${ADMIN_API}/v1/agent" | jq -r '.publicDid')}"
          CONTROLLER_ADDR=$(veranad keys show "$USER_ACC" -a --keyring-backend test)
          SCHEMA_BASE_ID="${CUSTOM_SCHEMA_BASE_ID:-example}"
          log "Agent DID: $AGENT_DID"
          log "Controller: $CONTROLLER_ADDR"

          # Load schema
          if [ -n "${CUSTOM_SCHEMA_URL:-}" ]; then
            SCHEMA_JSON=$(download_schema "$CUSTOM_SCHEMA_URL")
          else
            SCHEMA_JSON=$(jq -c '.' organization-vs/schema.json)
          fi
          LOCAL_CANON=$(echo "$SCHEMA_JSON" | jq -Sc 'del(."$id")')

          # =================================================================
          # Step 1: Find or create trust registry
          # =================================================================

          TR_URL="${INDEXER_URL}/verana/tr/v1/list?controller=${CONTROLLER_ADDR}&only_active=true"
          log "Querying indexer for existing trust registries: $TR_URL"
          TR_RESP=$(curl -s -w '\n%{http_code}' "$TR_URL")
          TR_HTTP=$(echo "$TR_RESP" | tail -1)
          TR_BODY=$(echo "$TR_RESP" | sed '$d')
          if [ "$TR_HTTP" -ne 200 ]; then
            echo "::error::Indexer query failed (HTTP $TR_HTTP). Cannot safely proceed — aborting to avoid duplicate trust registries."
            echo "::error::Response: $TR_BODY"
            exit 1
          fi

          # Filter client-side for trust registries matching our DID, sorted by ID ascending
          MATCHING_TR_IDS=$(echo "$TR_BODY" | jq -r --arg did "$AGENT_DID" \
            '[.trust_registries[] | select(.did == $did)] | sort_by(.id) | .[].id')

          TR_ID=$(echo "$MATCHING_TR_IDS" | head -1)

          if [ -n "$TR_ID" ]; then
            ok "Found existing active trust registry: TR=$TR_ID (DID=$AGENT_DID)"

            # Archive any duplicate active trust registries (keep only the oldest)
            STALE_TR_IDS=$(echo "$MATCHING_TR_IDS" | tail -n +2)
            if [ -n "$STALE_TR_IDS" ]; then
              log "Found $(echo "$STALE_TR_IDS" | wc -l | tr -d ' ') duplicate active trust registries — archiving..."
              for STALE_TR in $STALE_TR_IDS; do
                log "Archiving duplicate trust registry: TR=$STALE_TR"
                check_balance "$USER_ACC"
                veranad tx tr archive-trust-registry "$STALE_TR" true \
                  --from "$USER_ACC" --chain-id "$CHAIN_ID" --keyring-backend test \
                  --fees "$FEES" --node "$NODE_RPC" \
                  --output json -y > /dev/null 2>&1 || true
                ok "Archived duplicate trust registry: TR=$STALE_TR"
              done
            fi
          else
            log "No active trust registry found for DID=$AGENT_DID — creating..."
            EGF_DOC_DIGEST=$(compute_sri_digest "$EGF_DOC_URL")
            ok "EGF digest: $EGF_DOC_DIGEST"

            check_balance "$USER_ACC"
            TR_ID=$(submit_tx "create_trust_registry" "trust_registry_id" \
              veranad tx tr create-trust-registry \
              "$AGENT_DID" "${EGF_LANGUAGE:-en}" "$EGF_DOC_URL" "$EGF_DOC_DIGEST" \
              --aka "https://${INGRESS_HOST}")
            ok "Trust registry created: TR=$TR_ID"
          fi

          # =================================================================
          # Step 2: Find or create credential schema + root permission
          # =================================================================

          CS_URL="${INDEXER_URL}/verana/cs/v1/list?tr_id=${TR_ID}&only_active=true"
          log "Querying indexer for existing schemas: $CS_URL"
          CS_RESP=$(curl -s -w '\n%{http_code}' "$CS_URL")
          CS_HTTP=$(echo "$CS_RESP" | tail -1)
          CS_BODY=$(echo "$CS_RESP" | sed '$d')
          if [ "$CS_HTTP" -ne 200 ]; then
            echo "::error::Indexer schema query failed (HTTP $CS_HTTP). Aborting."
            echo "::error::Response: $CS_BODY"
            exit 1
          fi

          CS_ID=""
          while IFS= read -r entry; do
            [ -z "$entry" ] && continue
            ON_CHAIN_JS=$(echo "$entry" | jq -r '.json_schema // empty')
            [ -z "$ON_CHAIN_JS" ] && continue
            ON_CHAIN_CANON=$(echo "$ON_CHAIN_JS" | jq -Sc 'del(."$id")')
            if [ "$LOCAL_CANON" = "$ON_CHAIN_CANON" ]; then
              CS_ID=$(echo "$entry" | jq -r '.id')
              break
            fi
          done <<< "$(echo "$CS_BODY" | jq -c '.schemas[]?' 2>/dev/null)"

          if [ -n "$CS_ID" ]; then
            ok "Schema already exists on-chain: CS=$CS_ID — skipping creation"
          else
            log "Creating credential schema..."
            check_balance "$USER_ACC"
            CS_ID=$(submit_tx "create_credential_schema" "credential_schema_id" \
              veranad tx cs create-credential-schema "$TR_ID" "$SCHEMA_JSON" \
              --issuer-grantor-validation-validity-period '{"value":0}' \
              --verifier-grantor-validation-validity-period '{"value":0}' \
              --issuer-validation-validity-period '{"value":0}' \
              --verifier-validation-validity-period '{"value":0}' \
              --holder-validation-validity-period '{"value":0}' \
              3 1)
            ok "Credential schema created: CS=$CS_ID"

            # Create root permission
            check_balance "$USER_ACC"
            EFFECTIVE_FROM=$(future_timestamp 15)
            ROOT_PERM=$(submit_tx "create_root_permission" "root_permission_id" \
              veranad tx perm create-root-perm \
              "$CS_ID" "$AGENT_DID" \
              "${VALIDATION_FEES:-0}" "${ISSUANCE_FEES:-0}" "${VERIFICATION_FEES:-0}" \
              --effective-from "$EFFECTIVE_FROM")
            ok "Root permission created: PERM=$ROOT_PERM"
            sleep 21
          fi

          # =================================================================
          # Step 3: Find or create JSC
          # =================================================================

          VPR_REF="vpr:verana:${CHAIN_ID}/cs/v1/js/${CS_ID}"
          JSC_LIST=$(curl -sf "${ADMIN_API}/v1/vt/json-schema-credentials" 2>/dev/null || echo '{"data":[]}')
          EXISTING_JSC=$(echo "$JSC_LIST" | jq -r \
            --arg sid "$VPR_REF" \
            '.data[] | select(.schemaId == $sid) | .credential.id // empty' 2>/dev/null | head -1)

          if [ -n "$EXISTING_JSC" ]; then
            ok "JSC already exists for CS=$CS_ID (cred=$EXISTING_JSC) — skipping"
          else
            log "Creating JSC for '${SCHEMA_BASE_ID}' (CS=$CS_ID)..."
            JSC_RESP=$(curl -s -w '\n%{http_code}' -X POST "${ADMIN_API}/v1/vt/json-schema-credentials" \
              -H 'Content-Type: application/json' \
              -d "{\"schemaBaseId\": \"${SCHEMA_BASE_ID}\", \"jsonSchemaRef\": \"${VPR_REF}\"}")
            JSC_HTTP=$(echo "$JSC_RESP" | tail -1)
            JSC_BODY_RESP=$(echo "$JSC_RESP" | sed '$d')
            if [ "$JSC_HTTP" -ge 400 ]; then
              echo "::error::Failed to create JSC for '${SCHEMA_BASE_ID}' (HTTP $JSC_HTTP): $JSC_BODY_RESP"
              exit 1
            fi
            ok "JSC created for '${SCHEMA_BASE_ID}' (CS=$CS_ID)"
          fi

          ok "Trust Registry setup complete: TR=$TR_ID, CS=$CS_ID"

      # -----------------------------------------------------------------------
      # CLEANUP
      # -----------------------------------------------------------------------
      - name: Stop port-forward
        if: always()
        run: |
          if [ -n "${PF_PID:-}" ]; then
            kill "$PF_PID" 2>/dev/null || true
          fi

      # -----------------------------------------------------------------------
      # SUMMARY
      # -----------------------------------------------------------------------
      - name: Summary
        if: always()
        run: |
          echo "## Organization VS" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${INGRESS_HOST:-}" ]; then
            echo "- **VS Agent:** https://${INGRESS_HOST}/.well-known/did.json" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- **Network:** ${NETWORK:-unknown}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Service:** ${VS_NAME:-unknown}" >> "$GITHUB_STEP_SUMMARY"
