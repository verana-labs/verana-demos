# =============================================================================
# Verifier Web VS — Local Docker Compose
# =============================================================================
#
# Runs the VS Agent + Web Verifier for local development/testing.
#
# Prerequisites:
#   - Docker and Docker Compose installed
#   - ngrok running on port 3009
#
# Usage:
#   source verifier-web-vs/config.env
#   export NGROK_DOMAIN=your-domain.ngrok-free.app
#   docker compose up --build
#
# =============================================================================

services:
  vs-agent:
    image: ${VS_AGENT_IMAGE:-veranalabs/vs-agent:latest}
    platform: linux/amd64
    ports:
      - "${VS_AGENT_ADMIN_PORT:-3008}:3000"
      - "${VS_AGENT_PUBLIC_PORT:-3009}:3001"
    environment:
      - AGENT_PUBLIC_DID=did:webvh:${NGROK_DOMAIN}
      - AGENT_LABEL=${SERVICE_NAME:-Example Web Verifier}
      - ENABLE_PUBLIC_API_SWAGGER=true
    volumes:
      - vs-agent-data:/root/.afj

  verifier-web:
    build: ../verifier-web
    ports:
      - "${VERIFIER_PORT:-4003}:${VERIFIER_PORT:-4003}"
    environment:
      - VS_AGENT_ADMIN_URL=http://vs-agent:3000
      - VERIFIER_PORT=${VERIFIER_PORT:-4003}
      - SERVICE_NAME=${SERVICE_NAME:-Example Web Verifier}
      - ORG_VS_PUBLIC_URL=${ORG_VS_PUBLIC_URL:-}
      - ISSUER_VS_PUBLIC_URL=${ISSUER_VS_PUBLIC_URL:-}
    depends_on:
      - vs-agent

volumes:
  vs-agent-data:
